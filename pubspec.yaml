name: emotion_tracker
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  uuid: ^4.4.0

  # NEW DATABASE: Hive CE (No generators, no build_runner errors)
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.1.0

  path_provider: ^2.1.3
  table_calendar: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0 # Standard for Flutter 3.10+

  # build_runner kept only if needed by other future packages,
  # but Hive DOES NOT need it.
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/body_maps/